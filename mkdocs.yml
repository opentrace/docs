site_name: OpenTrace Documentation
site_url: https://docs.opentrace.com
site_description: Documentation for OpenTrace

# Copyright
copyright: Copyright &copy; 2026 OpenTrace

# Development server
dev_addr: 127.0.0.1:3009

repo_name: opentrace/docs
repo_url: https://github.com/opentrace/docs

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    scheme: slate
  font: false  # Loaded via CSS for full control
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - header.autohide
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/opentrace
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/opentraceai
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/opentraceai/

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs/snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Chat:
    - Overview: chat/index.md
    - Slack: chat/slack.md
  - Integrations:
    - Overview: integrations/index.md
    - AI Assistants:
      - Claude Code: integrations/claude-code.md
      - Claude Web: integrations/claude-web.md
      - GitHub Copilot: integrations/github-copilot.md
    - Data Sources:
      - GitHub: integrations/github.md
      - GitLab: integrations/gitlab.md
      - Excluding Files from Data Sources: otignore.md
      - AWS EKS (Early Access): integrations/aws-eks.md
  - What You Can Do: capabilities.md
  - Example Workflows: workflows.md
  - Privacy Policy: privacy-policy.md
  - Terms of Service: terms-of-service.md
